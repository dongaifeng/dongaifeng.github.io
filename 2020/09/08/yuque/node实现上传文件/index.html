ams">_type</span>) </span>&#123;</span><br><span class="line">      <span class="keyword">switch</span> (</span><br><span class="line">        _type <span class="comment">// 扩展名</span></span><br><span class="line">      ) &#123;</span><br><span class="line">        <span class="keyword">case</span> <span class="string">"html"</span>:</span><br><span class="line">        <span class="keyword">case</span> <span class="string">"htm"</span>:</span><br><span class="line">          <span class="keyword">return</span> <span class="string">"text/html charset=UTF-8"</span>;</span><br><span class="line">        <span class="keyword">case</span> <span class="string">"js"</span>:</span><br><span class="line">          <span class="keyword">return</span> <span class="string">"application/javascript charset=UTF-8"</span>;</span><br><span class="line">        <span class="keyword">case</span> <span class="string">"css"</span>:</span><br><span class="line">          <span class="keyword">return</span> <span class="string">"text/css charset=UTF-8"</span>;</span><br><span class="line">        <span class="keyword">case</span> <span class="string">"txt"</span>:</span><br><span class="line">          <span class="keyword">return</span> <span class="string">"text/plain charset=UTF-8"</span>;</span><br><span class="line">        <span class="keyword">case</span> <span class="string">"manifest"</span>:</span><br><span class="line">          <span class="keyword">return</span> <span class="string">"text/cache-manifest charset=UTF-8"</span>;</span><br><span class="line">        <span class="keyword">default</span>:</span><br><span class="line">          <span class="keyword">return</span> <span class="string">"application/octet-stream"</span>;</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;)(filename.substring(filename.lastIndexOf(<span class="string">"."</span>) + <span class="number">1</span>));</span><br><span class="line">    <span class="comment">// 异步
