pan class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">diff</span>(<span class="params">cache, newVNode</span>) </span>&#123;</span><br><span class="line">  <span class="keyword">const</span> &#123; vnode, node, parentNode &#125; = cache;</span><br><span class="line">  <span class="keyword">const</span> newNode = initVnode(newVNode, parentNode);</span><br><span class="line">  parentNode.replaceChild(newNode, node);</span><br><span class="line">  <span class="keyword">return</span> newNode;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">export</span> <span class="keyword">default</span> React;</span><br></pre></td></tr></table></figure>

> <span class="title">initVnode</span>(<span class="params">vnode, container</span>) </span>&#123;</span><br><span class="line">  <span class="keyword">let</span> node = <span class="literal">null</span>;</span><br><span class="line">  <span class="keyword">let</span> &#123; vtype &#125; = vnode;</span><br><span class="line">  <span class="keyword">if</span> (vtype === <span class="number">1</span>) &#123;</span><br><span class="line">    node = initHtmlNode(vnode, container);</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">if</span> (!vtype) &#123;</span><br><span class="line">    node = initTxtNode(vnode, container);</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">if</span> (vtype === <span class="number">3</span>) &#123;</span><br><span class="line">    node = initFunctionComponent(vnode, container);</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">if</span> (vtype === <span class="number">2</span>) &#123;</span><br><span class="line">    node = initClassComponent(vnode, container);</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">return</span> node;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 处理标签</span></span><br><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">initHtmlNode</span>(<span class="params">vnode, container</span>) </span>&#123;</span><br><span class="line">  <span class="keyword">const</span> &#123; type, props &#125; = vnode;</span><br><span class="line">  <span class="keyword">const</span> node = <span class="built_in">document</span>.createElement(type);</span><br><span class="line">  <span class="keyword">const</span> &#123; children, ...rest &#125; = props;</span><br><span class="line"></span><br><span class="line">  children.map(<span class="function">(<span class="params">item</span>) =&gt;</span> &#123;</span><br><span class="line">    node.appendChild(initVnode(item, node));</span><br><span class="line">  &#125;);</span><br><span class="line"></span><br><span class="line">  <span class="built_in">Object</span>.keys(rest).forEach(<span class="function">(<span class="params">item</span>) =&gt;</span> &#123;</span><br><span class="line">    <span class="keyword">if</span> (item === <span class="string">"className"</span>) &#123;</span><br><span class="line">      node.setAttribute(<span class="string">"class"</span>, rest[item]);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">if</span> (item.slice(<span class="number">0</span>, <span class="number">2</span>) === <span class="string">"on"</span>) &#123;</span><br><span class="line">      node.addEventListener(<span class="string">"click"</span>, rest[item]);</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;);</span><br><span class="line"></span><br><span class="line">  <span class="keyword">return</span> node;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 处理text节点</span></span><br><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">initTxtNode</span>(<span class="params">vnode, container</span>) </span>&#123;</span><br><span class="line">  <span class="keyword">return</span> <span class="built_in">document</span>.createTextNode(vnode);</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">// 处理函数组件</span></span><br><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">initFunctionComponent</span>(<span class="params">vnode, container</span>) </span>&#123;</span><br><span cla
